<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>3D cucumber growth &middot; Pao FSPM</title>
<style>
  :root{--canopy:#15352a;--leaf:#2d6a4f;--solar:#e9a23b;--slate:#46627a}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#13261c;overflow:hidden;
       background:linear-gradient(180deg,#cfe6f4,#eaf3ec 60%,#dfeede)}
  #c{position:fixed;inset:0;display:block;touch-action:none}
  header{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;
         align-items:center;gap:10px;padding:14px 16px;
         background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(255,255,255,0))}
  header a{color:var(--leaf);text-decoration:none;font-weight:700;font-size:.9rem;
           background:#fff;border:1px solid #d9e2dc;padding:8px 14px;border-radius:999px}
  header .t{font-weight:800;color:var(--canopy);font-size:.95rem}
  /* HUD */
  .hud{position:fixed;left:0;right:0;bottom:0;z-index:5;display:flex;flex-direction:column;
       align-items:center;gap:12px;padding:18px 16px 26px;
       background:linear-gradient(0deg,rgba(255,255,255,.9),rgba(255,255,255,0))}
  .day{font-weight:800;color:var(--canopy);font-size:1.1rem;display:flex;align-items:center;gap:10px}
  .bar{width:min(360px,82vw);height:8px;border-radius:999px;background:#d7e3da;overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--leaf),var(--solar));
         border-radius:999px;transition:width .4s ease}
  .water{border:none;cursor:pointer;font-weight:800;font-size:1rem;color:#fff;
         background:linear-gradient(135deg,#2f86c9,#1d6aa0);padding:13px 26px;border-radius:999px;
         box-shadow:0 8px 22px rgba(29,106,160,.35);display:inline-flex;align-items:center;gap:9px}
  .water:active{transform:translateY(1px)}
  .hint{font-size:.8rem;color:#5a665e}
  .replant{background:none;border:1px solid #c3d2c8;color:var(--leaf);padding:8px 16px;border-radius:999px;
           font-weight:700;font-size:.82rem;cursor:pointer}
  #spin{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;
        color:var(--leaf);font-weight:700;pointer-events:none;opacity:0;transition:opacity .2s}
  #spin.on{opacity:1}
  #spin .ring{width:34px;height:34px;border:4px solid #cfe2d4;border-top-color:var(--leaf);
              border-radius:50%;animation:sp .8s linear infinite;margin-right:12px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<header>
  <a href="index.html">&larr; Home</a>
  <span class="t">Pao cucumber &middot; 3D growth</span>
  <a href="poster.html">Poster &rarr;</a>
</header>

<div id="spin"><span class="ring"></span>loading&hellip;</div>

<div class="hud">
  <div class="day"><span id="dayl">Day 6</span></div>
  <div class="bar"><i id="prog"></i></div>
  <button class="water" id="water">&#128167; Water the plant</button>
  <div class="hint">drag to rotate &middot; tap the plant to water &amp; grow</div>
  <button class="replant" id="replant">&#8635; replant</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script>window.addEventListener('error',function(ev){var d=document.getElementById('dayl'); if(d&&/three|module|import/i.test(''+ev.message)) d.textContent='3D error: '+ev.message;});</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const STAGES=[{f:'models/cuc_06.obj',day:6},{f:'models/cuc_14.obj',day:14},
  {f:'models/cuc_22.obj',day:22},{f:'models/cuc_32.obj',day:32},
  {f:'models/cuc_42.obj',day:42},{f:'models/cuc_52.obj',day:52}];
let cur=0, model=null, growT=0, curScale=1, target=1;

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene(); scene.background=new THREE.Color(0xd8e9f1);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,100);
camera.position.set(3.4,2.4,4.4);

const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=.08;
controls.enablePan=false; controls.minDistance=2.2; controls.maxDistance=9;
controls.maxPolarAngle=Math.PI*0.49; controls.target.set(0,1.1,0);
controls.autoRotate=true; controls.autoRotateSpeed=.8;

scene.add(new THREE.HemisphereLight(0xeaf4ff,0x4a6b3a,0.9));
const sun=new THREE.DirectionalLight(0xfff2d0,1.5); sun.position.set(4,7,3); scene.add(sun);

// sol + serre stylisée
const ground=new THREE.Mesh(new THREE.CircleGeometry(6,48),
  new THREE.MeshStandardMaterial({color:0xdcd0a4,roughness:1}));
ground.rotation.x=-Math.PI/2; scene.add(ground);
const mat=new THREE.MeshStandardMaterial({color:0x4e9a4e,roughness:.66,side:THREE.DoubleSide});

const spin=document.getElementById('spin');
const loader=new OBJLoader();
function loadStage(i){
  spin.classList.add('on');
  loader.load(STAGES[i].f, obj=>{
    obj.traverse(c=>{ if(c.isMesh){ if(c.geometry&&!c.geometry.attributes.normal) c.geometry.computeVertexNormals(); c.material=mat; } });
    const box=new THREE.Box3().setFromObject(obj);
    const ctr=box.getCenter(new THREE.Vector3());
    const rawH=Math.max(0.01, box.max.y-box.min.y);
    const targetH=1.0+1.8*i/(STAGES.length-1);
    const sc=targetH/rawH; curScale=sc; target=sc;
    obj.position.set(-ctr.x*sc, -box.min.y*sc, -ctr.z*sc);
    if(model) scene.remove(model);
    model=obj; scene.add(obj);
    obj.scale.setScalar(sc*0.82); growT=0;
    controls.target.set(0, targetH*0.5, 0);
    const dist=Math.max(3.2,targetH*2.2); camera.position.set(dist*0.62,targetH*0.7+0.6,dist*0.8); controls.update();
    document.getElementById('dayl').textContent='Day '+STAGES[i].day;
    document.getElementById('prog').style.width=(100*i/(STAGES.length-1))+'%';
    spin.classList.remove('on');
  }, undefined, e=>{ spin.classList.remove('on'); document.getElementById('dayl').textContent='load error'; console.error('OBJ load failed',e); });
}

function grow(){
  if(cur<STAGES.length-1){ cur++; loadStage(cur); waterFX(); }
  else { waterFX(); }   // déjà mature
}
function replant(){ cur=0; loadStage(0); }
document.getElementById('water').onclick=grow;
document.getElementById('replant').onclick=replant;

// clic / tap sur la plante -> arroser
const ray=new THREE.Raycaster(), m=new THREE.Vector2();
let down=null;
canvas.addEventListener('pointerdown',e=>down={x:e.clientX,y:e.clientY});
canvas.addEventListener('pointerup',e=>{
  if(!down) return;
  if(Math.hypot(e.clientX-down.x,e.clientY-down.y)<6){   // un clic, pas un drag
    grow();
  }
  down=null;
});

// gouttes d'eau
const drops=[];
function waterFX(){
  for(let k=0;k<10;k++){
    const d=new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8),
      new THREE.MeshStandardMaterial({color:0x6cc0ff,transparent:true,opacity:.85}));
    d.position.set((Math.random()-.5)*1.4, 3+Math.random(), (Math.random()-.5)*1.4);
    d.userData.v=0.05+Math.random()*0.04; scene.add(d); drops.push(d);
  }
}

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); });
renderer.setSize(innerWidth,innerHeight);

function tick(){
  requestAnimationFrame(tick);
  if(model && growT<1){ growT=Math.min(1,growT+0.04); model.scale.setScalar(curScale*(0.82+0.18*growT)); }
  for(let i=drops.length-1;i>=0;i--){ const d=drops[i]; d.position.y-=d.userData.v*2; d.material.opacity-=0.012;
    if(d.position.y<0.05||d.material.opacity<=0){ scene.remove(d); drops.splice(i,1);} }
  controls.update(); renderer.render(scene,camera);
}
loadStage(0); tick();
</script>
</body>
</html>
